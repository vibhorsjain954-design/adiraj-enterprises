<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Adiraj Enterprises</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar {
  width:250px;
  height:100vh;
  background:#0f2027;
  position:fixed;
  left:0;
  top:0;
  padding-top:20px;
  color:white;
}

.sidebar img {
  width:180px;
  display:block;
  margin:0 auto 30px auto;
}

.sidebar a {
  display:block;
  padding:15px 25px;
  color:white;
  text-decoration:none;
}

.sidebar a:hover,
.sidebar a.active {
  background:#1a2a40;
}

/* CONTENT */
.content {
  margin-left:250px;
  padding:40px;
}

button {
  padding:8px 15px;
  background:#1a2a40;
  color:white;
  border:none;
  cursor:pointer;
  margin:5px 0;
}

button:hover {
  background:#243b55;
}

.card-container {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap:20px;
  margin-top:20px;
}

.card {
  background:white;
  padding:25px;
  border-radius:8px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.count {
  font-size:26px;
  font-weight:bold;
  color:#1a2a40;
}
</style>
</head>

<body>

<div class="sidebar">
  <img src="assets/logo.png">

  <a href="dashboard.html">🏠 Dashboard</a>
  <a href="billing.html">📄 Billing</a>
  <a href="stock.html">📦 Stock</a>
  <a href="payments.html">💰 Payments</a>
  <a href="parties.html">👥 Parties</a>
  <a href="ledger.html">📑 Ledger</a>
  <a href="history.html">🧾 Invoice History</a>
  <a href="summary.html">📊 Party Summary</a>
  <a href="staff.html" id="staffLink" style="display:none;">🧑‍💼 Staff</a>
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<div class="content">

<h2>Dashboard Overview</h2>

<button onclick="manualBackup()">📥 Manual Backup</button>
<input type="file" id="restoreFile" accept=".json">
<button onclick="restoreBackup()">♻ Restore Backup</button>
<p id="backupStatus"></p>

<div class="card-container">

<div class="card">
<h3>Total Invoices</h3>
<div id="invoiceCount" class="count">Loading...</div>
</div>

<div class="card">
<h3>Total Payments</h3>
<div id="paymentCount" class="count">Loading...</div>
</div>

<div class="card">
<h3>Total Parties</h3>
<div id="partyCount" class="count">Loading...</div>
</div>

<div class="card">
<h3>Total Items</h3>
<div id="itemCount" class="count">Loading...</div>
</div>

<div class="card">
<h3>Total Outstanding</h3>
<div id="totalOutstanding" class="count">Loading...</div>
</div>

</div>
</div>

<script>
const { createClient } = supabase;

const client = createClient(
  "https://tcgspigynbhhrlgtfnux.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjZ3NwaWd5bmJoaHJsZ3RmbnV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTAwMDksImV4cCI6MjA4NzI2NjAwOX0.s6XnSwWiha7GD000I4xyXRqWtWzK1hsrMVuRpFQNgaU"
);

/* ===============================
   AUTH + ROLE CHECK
================================= */

document.addEventListener("DOMContentLoaded", async () => {

  const { data: { user } } = await client.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data } = await client
    .from("user_roles")
    .select("role")
    .eq("user_id", user.id)
    .single();

  if (data.role === "admin") {
    document.getElementById("staffLink").style.display = "block";
  }

  highlightActiveMenu();
  loadDashboard();
  autoBackupCheck();
});

/* ===============================
   DASHBOARD DATA
================================= */

async function loadDashboard() {

  const { count: invoiceCount } = await client.from("invoices").select("*", { count: "exact", head: true });
  const { count: paymentCount } = await client.from("payments").select("*", { count: "exact", head: true });
  const { count: partyCount } = await client.from("parties").select("*", { count: "exact", head: true });
  const { count: itemCount } = await client.from("items").select("*", { count: "exact", head: true });

  const { data: parties } = await client.from("parties").select("balance");

  let totalOutstanding = 0;
  parties?.forEach(p => totalOutstanding += Number(p.balance || 0));

  document.getElementById("invoiceCount").innerText = invoiceCount ?? 0;
  document.getElementById("paymentCount").innerText = paymentCount ?? 0;
  document.getElementById("partyCount").innerText = partyCount ?? 0;
  document.getElementById("itemCount").innerText = itemCount ?? 0;
  document.getElementById("totalOutstanding").innerText = "₹ " + totalOutstanding.toLocaleString();
}

/* ===============================
   BACKUP SYSTEM
================================= */

async function manualBackup() {
  document.getElementById("backupStatus").innerText = "Preparing backup...";

  const tables = ["invoices","payments","parties","items","invoice_items","user_roles"];
  let backup = {};

  for (let table of tables) {
    const { data } = await client.from(table).select("*");
    backup[table] = data || [];
  }

  backup.generated_at = new Date().toISOString();

  const blob = new Blob([JSON.stringify(backup, null, 2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "adiraj-backup-" + new Date().toISOString().split("T")[0] + ".json";
  a.click();

  localStorage.setItem("lastBackupTime", new Date().toISOString());
  document.getElementById("backupStatus").innerText = "Backup Downloaded!";
}

async function autoBackupCheck() {
  const lastBackup = localStorage.getItem("lastBackupTime");
  if (!lastBackup) return manualBackup();

  const hoursDiff = (new Date() - new Date(lastBackup)) / (1000*60*60);
  if (hoursDiff >= 12) manualBackup();
}

/* ===============================
   RESTORE SYSTEM
================================= */

async function restoreBackup() {

  const fileInput = document.getElementById("restoreFile");
  const file = fileInput.files[0];

  if (!file) {
    alert("Select backup file first");
    return;
  }

  const text = await file.text();
  const backup = JSON.parse(text);

  if (!confirm("This will overwrite existing data. Continue?")) return;

  const tables = ["invoices","payments","parties","items","invoice_items","user_roles"];

  for (let table of tables) {
    if (backup[table]) {
      await client.from(table).delete().neq("id","0");
      await client.from(table).insert(backup[table]);
    }
  }

  alert("Restore Completed!");
  loadDashboard();
}

/* ===============================
   HELPERS
================================= */

async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}

function highlightActiveMenu() {
  const links = document.querySelectorAll(".sidebar a");
  links.forEach(link => {
    if (link.href === window.location.href) {
      link.classList.add("active");
    }
  });
}
</script>

</body>
</html>
