<!DOCTYPE html>
<html>
<head>
  <title>Adiraj Enterprises - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-card {
      width:400px;
      background:white;
      padding:40px;
      border-radius:12px;
      box-shadow:0 15px 35px rgba(0,0,0,0.3);
      text-align:center;
    }

    .logo {
      width:240px;
      margin-bottom:30px;
    }

    input {
      width:100%;
      padding:12px;
      margin:12px 0;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:14px;
    }

    button {
      width:100%;
      padding:12px;
      background:#1a2a40;
      color:white;
      border:none;
      border-radius:6px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover {
      background:#243b55;
    }

    #msg {
      margin-top:15px;
      color:red;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="login-card">
  <img src="assets/logo.png" class="logo">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <p id="msg"></p>
</div>

<script>
const { createClient } = supabase;

const client = createClient(
  "https://tcgspigynbhhrlgtfnux.supabase.co",
  "sb_publishable_N-fCmOba38-jMzGTo7SbCg_YzdQDoA-"
);

// LOGIN
document.getElementById("loginBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("msg").innerText = error.message;
    return;
  }

  checkRole(data.user.id);
});

// ROLE CHECK
async function checkRole(userId) {

  const { data, error } = await client
    .from("user_roles")
    .select("role")
    .eq("user_id", userId)
    .maybeSingle();

  if (!data) {
    document.getElementById("msg").innerText = "No role assigned";
    return;
  }

  if (data.role === "admin") {
    window.location.href = "dashboard.html";
  } else {
    window.location.href = "mobile_billing.html";
  }
}
</script>

</body>
</html>
