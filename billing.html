<!DOCTYPE html>
<html>
<head>
<title>Billing - Adiraj Enterprises</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6f9;
}

.sidebar {
  width:250px;
  height:100vh;
  background:#0f2027;
  position:fixed;
  padding-top:20px;
}

.sidebar a {
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
}

.sidebar a:hover {
  background:#1a2a40;
}

.content {
  margin-left:250px;
  padding:30px;
}

input, select {
  padding:8px;
  margin:5px;
}

button {
  padding:8px 15px;
  background:#1a2a40;
  color:white;
  border:none;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
}

table, th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}
</style>
</head>

<body>

<div class="sidebar">
  <a href="dashboard.html">Dashboard</a>
  <a href="billing.html">Billing</a>
  <a href="stock.html">Stock</a>
</div>

<div class="content">

<h2>New Invoice</h2>

<label>Invoice No:</label>
<input type="text" id="invoiceNo" readonly>

<label>Date:</label>
<input type="text" id="displayDate" readonly>

<br><br>

<select id="partySelect"></select>

<br><br>

<table id="billTable">
<tr>
  <th>Item</th>
  <th>Qty</th>
  <th>Rate</th>
  <th>Total</th>
</tr>
</table>

<button onclick="addRow()">Add Item</button>

<h3>Total: ₹ <span id="grandTotal">0</span></h3>

<button onclick="saveInvoice()">Save</button>
<button onclick="window.print()">Print</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<script>
const { createClient } = supabase;

const client = createClient(
  "https://tcgspigynbhhrlgtfnux.supabase.co",
  "sb_publishable_YOUR_KEY_HERE"
);

/* =========================
   AUTO DATE
========================= */
function setTodayDate() {
  const today = new Date();

  const display =
    String(today.getDate()).padStart(2,'0') + "-" +
    String(today.getMonth()+1).padStart(2,'0') + "-" +
    today.getFullYear();

  document.getElementById("displayDate").value = display;
}

function getDBDate() {
  const today = new Date();
  return today.toISOString().split("T")[0];
}

/* =========================
   FINANCIAL YEAR
========================= */
function getFinancialYear() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth() + 1;

  if (month >= 8) {
    return year;
  } else {
    return year - 1;
  }
}

/* =========================
   AUTO INVOICE NUMBER
========================= */
async function generateInvoiceNumber() {

  const fy = getFinancialYear();

  const startDate = fy + "-08-01";
  const endDate = (fy+1) + "-07-31";

  const { data } = await client
    .from("invoices")
    .select("invoice_no")
    .gte("date", startDate)
    .lte("date", endDate)
    .order("invoice_no", { ascending:false })
    .limit(1);

  let nextNumber = 1;

  if (data.length > 0) {
    const last = data[0].invoice_no;
    const num = parseInt(last.replace("AD",""));
    nextNumber = num + 1;
  }

  const formatted = "AD" + String(nextNumber).padStart(5,'0');

  document.getElementById("invoiceNo").value = formatted;
}

/* =========================
   LOAD PARTIES
========================= */
async function loadParties() {
  const { data } = await client
    .from("parties")
    .select("*")
    .order("name", { ascending:true });

  const select = document.getElementById("partySelect");

  data.forEach(p => {
    const option = document.createElement("option");
    option.value = p.id;
    option.textContent = p.name;
    select.appendChild(option);
  });
}

/* =========================
   ADD ROW
========================= */
function addRow() {

  const table = document.getElementById("billTable");

  const row = table.insertRow();

  row.innerHTML = `
    <td><input type="text"></td>
    <td><input type="number" oninput="calculateTotal()"></td>
    <td><input type="number" oninput="calculateTotal()"></td>
    <td class="rowTotal">0</td>
  `;
}

function calculateTotal() {

  const rows = document.querySelectorAll("#billTable tr");
  let grand = 0;

  rows.forEach((row, index) => {
    if(index===0) return;

    const qty = row.cells[1].children[0].value || 0;
    const rate = row.cells[2].children[0].value || 0;

    const total = qty * rate;
    row.cells[3].innerText = total;

    grand += total;
  });

  document.getElementById("grandTotal").innerText = grand;
}

/* =========================
   SAVE INVOICE
========================= */
async function saveInvoice() {

  const invoiceNo = document.getElementById("invoiceNo").value;
  const partyId = document.getElementById("partySelect").value;
  const totalAmount = document.getElementById("grandTotal").innerText;
  const date = getDBDate();

  if (!partyId) {
    alert("Select party");
    return;
  }

  const { data, error } = await client
    .from("invoices")
    .insert([{
      invoice_no: invoiceNo,
      party_id: partyId,
      total_amount: totalAmount,
      date: date
    }]);

  if (error) {
    alert("Error saving invoice");
    return;
  }

  // Update party balance
  await client.rpc('increment_party_balance', {
    party_id_input: partyId,
    amount_input: totalAmount
  });

  alert("Invoice Saved Successfully!");

  location.reload();
}

/* =========================
   PDF EXPORT
========================= */
function downloadPDF() {
  window.print();
}

/* =========================
   INIT
========================= */
setTodayDate();
generateInvoiceNumber();
loadParties();
</script>

</body>
</html>
